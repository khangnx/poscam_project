version: '3.8'

networks:
  shop_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

services:
  # 1. Laravel Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: shop_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/laravel/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - shop_network
    depends_on:
      - app

  # 2. Laravel App Server (PHP-FPM 8.3)
  app:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: shop_laravel
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    networks:
      - shop_network
    depends_on:
      - mysql
      - redis

  # 3. Laravel Reverb (WebSocket Server)
  reverb:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: shop_reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    networks:
      - shop_network
    depends_on:
      - app
  # 4. Vue 3 (Frontend - Vite)
  frontend:
    build:
      context: .
      dockerfile: docker/vue/Dockerfile
    container_name: shop_vue
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - shop_network
    environment:
      # Hỗ trợ hot reload trên một số môi trường (Windows/WSL)
      - CHOKIDAR_USEPOLLING=true

  # 5. MySQL 8.0
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: shop_mysql
    restart: unless-stopped
    platform: linux/amd64 # Hỗ trợ tốt hơn cho Mac M1/M2 nếu cần thiết
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-shop_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-shop_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shop_network

  # 6. Redis
  redis:
    image: redis:alpine
    container_name: shop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shop_network
